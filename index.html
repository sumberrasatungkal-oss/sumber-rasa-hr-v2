<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SR HR — Sumber Rasa (Cloud)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --card: #1e2235;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  #loadingScreen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; z-index: 9999;
  }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingScreen .ltext { font-size: 13px; color: var(--muted); }

  #loginScreen { min-height: 100vh; display: none; align-items: center; justify-content: center; background: radial-gradient(ellipse at 30% 20%, #1a2456 0%, var(--bg) 60%); padding: 20px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .login-logo-img { width: 64px; height: 64px; border-radius: 16px; object-fit: cover; margin-bottom: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  .topbar-logo-img { width: 28px; height: 28px; border-radius: 7px; object-fit: cover; }
  .topbar-brand { display: flex; align-items: center; gap: 8px; }
  .ps-logo { width: 40px; height: 40px; border-radius: 9px; object-fit: cover; margin: 0 auto 8px; display: block; }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .login-logo .brand span { color: var(--accent); }
  .login-logo .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .login-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text); }

  input, select, textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none; transition: border 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; font-weight: 500; }
  .pass-wrap { position: relative; }
  .pass-wrap input { padding-right: 42px; }
  .pass-toggle {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 6px 8px;
    color: var(--muted); font-size: 16px; line-height: 1;
  }
  .pass-toggle:hover { color: var(--accent); }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; width: 100%; padding: 12px; }
  .btn-primary:hover { background: #3a7ae8; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 7px; }
  .btn-accent2 { background: var(--accent2); color: #fff; }

  .login-err { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; display: none; }

  #appShell { display: none; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-brand { font-size: 16px; font-weight: 700; }
  .topbar-brand span { color: var(--accent); }
  .topbar-user { display: flex; align-items: center; gap: 10px; }
  .topbar-user .user-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); }
  .topbar-user .user-badge b { color: var(--text); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 5px; }
  .sync-dot.off { background: var(--red); }

  .nav-tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0 16px; gap: 0; }
  .nav-tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab:hover { color: var(--text); }

  .btn-burger { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 6px 10px; margin-right: 2px; border-radius: 8px; }
  .btn-burger:hover { background: var(--surface2); }
  .burger-backdrop { display: none; position: fixed; inset: 56px 0 0 0; background: rgba(0,0,0,0.45); z-index: 98; }
  .burger-backdrop.open { display: block; }
  .burger-menu { display: none; position: fixed; top: 56px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 99; max-height: 75vh; overflow-y: auto; box-shadow: 0 16px 32px rgba(0,0,0,0.45); }
  .burger-menu.open { display: block; }
  .burger-menu .nav-tab { padding: 15px 22px; border-bottom: 1px solid var(--border); border-left: 3px solid transparent; white-space: normal; }
  .burger-menu .nav-tab.active { border-left-color: var(--accent); background: var(--surface2); color: var(--accent); }
  .burger-menu .nav-tab.logout-tab { color: var(--red); }

  .main { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
  .stat-card .stat-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-card .stat-val.green { color: var(--green); }
  .stat-card .stat-val.yellow { color: var(--yellow); }
  .stat-card .stat-val.red { color: var(--red); }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-pending { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .badge-approved { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-rejected { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-cancelled { background: rgba(123,130,168,0.15); color: var(--muted); }
  .badge-active { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-lunas { background: rgba(34,197,94,0.1); color: var(--green); }
  .badge-free { background: rgba(34,197,94,0.15); color: var(--green); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; margin: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
  .modal-close:hover { color: var(--text); }

  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .section-title { font-size: 16px; font-weight: 700; }

  .emp-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .emp-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
  .emp-info { flex: 1; margin-left: 12px; min-width: 150px; }
  .emp-name { font-size: 14px; font-weight: 600; }
  .emp-id { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .emp-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .loan-item { padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .loan-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .loan-name { font-weight: 600; font-size: 14px; }
  .loan-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 10px; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; }

  .notice { background: rgba(79,142,247,0.08); border: 1px solid rgba(79,142,247,0.2); border-radius: 10px; padding: 12px 14px; font-size: 13px; color: var(--muted); }
  .notice b { color: var(--accent); }
  .notice.warn { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.2); }
  .notice.warn b { color: var(--yellow); }

  .slip-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .slip-row:last-child { border-bottom: none; }
  .slip-row.total { font-weight: 700; font-size: 16px; color: var(--green); padding-top: 12px; }
  .slip-row.deduct { color: var(--red); }
  .slip-row.add { color: var(--green); }
  .slip-label { color: var(--muted); font-size: 13px; }
  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  .month-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .month-bar select { width: auto; flex: 1; min-width: 120px; }

  .empty { text-align: center; padding: 32px 0; color: var(--muted); font-size: 13px; }
  .leave-dates { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .leave-date-tag { background: rgba(245,158,11,0.12); color: var(--yellow); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 500; }

  .emp-dash-header { text-align: center; padding: 20px 0 10px; }
  .emp-dash-header .greet { font-size: 12px; color: var(--muted); }
  .emp-dash-header .name { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .emp-dash-header .emp-id-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; font-size: 12px; color: var(--muted); margin-top: 6px; }

  .req-item { padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .req-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .req-type { font-size: 13px; font-weight: 600; }
  .req-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* CALENDAR */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
  .cal-dow { text-align: center; font-size: 10px; color: var(--muted); font-weight: 600; padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    transition: all 0.15s; position: relative;
  }
  .cal-day.empty-cell { visibility: hidden; cursor: default; }
  .cal-day.allowed { background: rgba(34,197,94,0.15); color: var(--green); border-color: rgba(34,197,94,0.3); }
  .cal-day.allowed.selected { background: var(--green); color: #fff; }
  .cal-day:not(.owner-mode):not(.allowed) { cursor: not-allowed; opacity: 0.4; }
  .cal-day.owner-mode:hover { border-color: var(--accent); }
  .cal-day.taken { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.25); cursor: not-allowed; opacity: 0.75; }
  .cal-note-btn { position: absolute; top: -3px; right: -3px; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; font-size: 9px; width: 16px; height: 16px; padding: 0; cursor: pointer; opacity: 0.55; line-height: 1; display:flex;align-items:center;justify-content:center; }
  .cal-note-btn.has-note { opacity: 1; border-color: var(--yellow); }
  .mini-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .mini-table th { text-align: left; color: var(--muted); font-weight: 600; padding: 6px 6px; border-bottom: 1px solid var(--border); font-size: 11px; }
  .mini-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); }
  .mini-table tfoot td { font-weight: 700; border-top: 2px solid var(--border); border-bottom: none; }

  .report-type-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 8px; margin-bottom: 4px; }
  .report-type-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; }
  .report-type-btn.active { border-color: var(--accent); background: rgba(99,102,241,0.12); color: var(--accent); }
  .period-presets { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 12px; }
  .period-presets button { border: 1px solid var(--border); background: var(--surface2); color: var(--muted); border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
  .period-presets button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .field-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .field-row select { flex: 1; }
  .report-print-header { text-align: center; margin-bottom: 14px; }
  .policy-text { font-size: 13px; line-height: 1.7; color: var(--text); white-space: normal; }

  @media print {
    .no-print, .topbar, .burger-menu, .burger-backdrop { display: none !important; }
    body { background: #fff; color: #111; }
    .main { padding: 0; }
    .card { box-shadow: none; border: 1px solid #ddd; }
  }
  .cal-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .cal-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  /* PAYSLIP PAGE */
  .payslip-page { background: #fff; color: #1a1d27; border-radius: 16px; padding: 28px 22px; max-width: 420px; margin: 0 auto; }
  .payslip-page .ps-header { text-align: center; border-bottom: 2px solid #1a1d27; padding-bottom: 14px; margin-bottom: 16px; }
  .payslip-page .ps-brand { font-size: 18px; font-weight: 700; }
  .payslip-page .ps-sub { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .payslip-page .ps-title { font-size: 13px; font-weight: 600; margin-top: 10px; color: #374151; }
  .payslip-page .ps-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 13px; border-bottom: 1px solid #e5e7eb; }
  .payslip-page .ps-row.total { font-weight: 700; font-size: 16px; border-top: 2px solid #1a1d27; border-bottom: none; margin-top: 8px; padding-top: 12px; }
  .payslip-page .ps-row .neg { color: #dc2626; }
  .payslip-page .ps-row .pos { color: #16a34a; }
  .payslip-page .ps-label { color: #6b7280; }
  .payslip-page .ps-footer { text-align: center; font-size: 10px; color: #9ca3af; margin-top: 18px; }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .modal { padding: 18px; }
    .cal-day { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="ltext">Menghubungkan ke cloud...</div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img id="loginLogoImg" class="login-logo-img" alt="Sumber Rasa">
      <div class="brand">SR <span>HR</span></div>
      <div class="sub">Sumber Rasa — Manajemen Karyawan (Cloud)</div>
    </div>
    <h2>Masuk ke Akun</h2>
    <div class="field"><label>ID Pengguna</label><input type="text" id="loginId" placeholder="Contoh: ADMIN atau EMP001"></div>
    <div class="field">
      <label>Password</label>
      <div class="pass-wrap">
        <input type="password" id="loginPass" placeholder="Password">
        <button type="button" class="pass-toggle" onclick="togglePass('loginPass', this)">👁</button>
      </div>
    </div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Masuk</button>
    <div class="login-err" id="loginErr">ID atau password salah.</div>
  </div>
</div>

<div id="appShell">
  <div class="topbar">
    <button class="btn-burger" id="burgerBtn" onclick="toggleBurgerMenu()" aria-label="Menu">☰</button>
    <div class="topbar-brand"><img id="topbarLogoImg" class="topbar-logo-img" alt="Sumber Rasa">SR <span>HR</span></div>
    <div class="topbar-user">
      <div class="user-badge"><span class="sync-dot" id="syncDot"></span><b id="topbarName">-</b></div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="burger-backdrop" id="burgerBackdrop" onclick="closeBurgerMenu()"></div>
  <div class="burger-menu" id="burgerMenu"></div>
  <div class="main" id="mainContent"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Modal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
document.getElementById('loginLogoImg').src = LOGO_DATA_URI;
document.getElementById('topbarLogoImg').src = LOGO_DATA_URI;

const POSITION_OPTIONS = ['Kasir','Kepala Toko','Owner/Admin','Sales','Staff','Supervisor'];
function positionGrantsAdmin(pos) { return pos === 'Owner/Admin' || pos === 'Supervisor'; }
function positionFieldHtml(prefix, selected) {
  const isCustom = selected && !POSITION_OPTIONS.includes(selected);
  return `
    <select id="${prefix}" onchange="document.getElementById('${prefix}Custom').style.display=this.value==='custom'?'block':'none'">
      ${POSITION_OPTIONS.map(p=>`<option value="${p}" ${selected===p?'selected':''}>${p}</option>`).join('')}
      <option value="custom" ${isCustom?'selected':''}>Custom...</option>
    </select>
    <input id="${prefix}Custom" placeholder="Tulis posisi lain" value="${isCustom?selected:''}" style="margin-top:6px;${isCustom?'':'display:none'}">
  `;
}
function readPosition(prefix) {
  const sel = document.getElementById(prefix).value;
  return sel === 'custom' ? document.getElementById(prefix+'Custom').value.trim() : sel;
}

// Collections: users, employees, leaves, loans, requests, installments, bonuses, leaveCalendar
const Cloud = {
  async getAll(col) {
    const snap = await db.collection(col).get();
    return snap.docs.map(d => d.data());
  },
  async setDoc(col, id, data) { await db.collection(col).doc(id).set(data); },
  async deleteDoc(col, id) { await db.collection(col).doc(id).delete(); }
};

function escapeHtmlPolicy(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderPolicyText(text) {
  let html = escapeHtmlPolicy(text);
  html = html.replace(/\*([^\*\n]+)\*/g, '<b>$1</b>');
  html = html.replace(/_([^_\n]+)_/g, '<i>$1</i>');
  html = html.replace(/\n/g, '<br>');
  return html;
}
function getPolicyText() {
  const doc = CACHE.companyPolicy && CACHE.companyPolicy[0];
  return doc ? doc.content : DEFAULT_POLICY_TEXT;
}

function reqCard(r, withAction=false) {
  const emp = getEmp(r.empId);
  const name = emp ? emp.name : r.empId;
  const isLeave = r.type === 'leave';
  const detail = isLeave
    ? `Izin tanggal: ${r.dates ? r.dates.join(', ') : '-'} | Alasan: ${r.reason||'-'}`
    : `Pinjam: ${fmtRp(r.amount)} (lunas bulan ini) | Alasan: ${r.reason||'-'}`;
  const canCancel = withAction && (r.status==='approved' || r.status==='rejected') && canCancelRequest(r);
  return `
    <div class="req-item">
      <div class="req-top">
        <div>
          <div class="req-type">${name} — ${isLeave?'Izin':'Pinjaman'}</div>
          <div class="req-detail">${detail}</div>
          <div class="req-detail" style="margin-top:2px;font-size:11px;color:var(--muted)">${r.createdAt||''}</div>
        </div>
        <span class="badge badge-${r.status}">${labelStatus(r.status)}</span>
      </div>
      ${withAction && r.status==='pending' ? `
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-success btn-sm" onclick="approveReq('${r.id}')">✓ Approve</button>
          <button class="btn btn-danger btn-sm" onclick="rejectReq('${r.id}')">✕ Tolak</button>
        </div>` : ''}
      ${canCancel ? `
        <div style="margin-top:10px">
          <button class="btn btn-ghost btn-sm" onclick="cancelApprovedReq('${r.id}')">↩ Batalkan Pengajuan Ini</button>
        </div>` : ''}
    </div>`;
}

function canCancelRequest(r) {
  if (r.type === 'loan') return true;
  if (r.type === 'leave') {
    const days = r.dayNumbers || [];
    if (days.length === 0) return false;
    const earliest = Math.min(...days);
    const leaveDate = new Date(parseInt(r.year), parseInt(r.month), earliest);
    leaveDate.setHours(0,0,0,0);
    const todayD = new Date(); todayD.setHours(0,0,0,0);
    return todayD < leaveDate;
  }
  return false;
}

async function cancelApprovedReq(id) {
  const r = CACHE.requests.find(x=>x.id===id);
  if (!r) return;
  if (!canCancelRequest(r)) { alert('Pengajuan ini sudah lewat H-1 dan tidak bisa dibatalkan lagi.'); return; }
  const reason = prompt('Alasan pembatalan (opsional, akan ditampilkan ke karyawan):') || '';
  if (!confirm('Yakin batalkan pengajuan ini? Akan dianggap tidak pernah terjadi.')) return;
  try {
    if (r.type === 'leave') {
      const lv = CACHE.leaves.find(l => l.reqId === r.id);
      if (lv) await Cloud.deleteDoc('leaves', lv.id);
    }
    if (r.type === 'loan') {
      const ln = CACHE.loans.find(l => l.reqId === r.id);
      if (ln) await Cloud.deleteDoc('loans', ln.id);
    }
    r.status = 'cancelled';
    r.cancelNotice = true;
    r.cancelReason = reason;
    r.cancelledAt = today();
    await Cloud.setDoc('requests', id, r);
    await refreshCache();
    renderAdminTab(activeTab);
  } catch(e) { alert('Gagal membatalkan: ' + e.message); }
}

// Simulates the installment balance month-by-month from its start date up to
// (and including) the target month, factoring in regular monthly deductions
// AND any extra payments recorded via Review Gaji. Pure/no side effects.
function computeInstallmentForMonth(inst, month, year) {
  let balance = inst.totalAmount;
  let m = inst.startMonth, y = inst.startYear;
  while (y < year || (y === year && m < month)) {
    if (balance <= 0) break;
    balance -= Math.min(inst.monthlyAmount, balance);
    const ov = CACHE.payrollOverrides.find(o => o.empId===inst.empId && parseInt(o.month)===m && parseInt(o.year)===y);
    if (ov && ov.extraInstallmentPayment) balance = Math.max(0, balance - ov.extraInstallmentPayment);
    m++; if (m > 11) { m = 0; y++; }
  }
  if (balance <= 0) return { deduct: 0, regularPart: 0, extraPart: 0, balanceAfter: 0, monthsLeftEstimate: 0 };
  const regularPart = Math.min(inst.monthlyAmount, balance);
  balance -= regularPart;
  const ovThis = CACHE.payrollOverrides.find(o => o.empId===inst.empId && parseInt(o.month)===month && parseInt(o.year)===year);
  const extraPart = (ovThis && ovThis.extraInstallmentPayment) ? Math.min(ovThis.extraInstallmentPayment, balance) : 0;
  balance -= extraPart;
  return {
    deduct: regularPart + extraPart, regularPart, extraPart, balanceAfter: balance,
    monthsLeftEstimate: balance > 0 ? Math.ceil(balance / inst.monthlyAmount) : 0
  };
}

async function approveReq(id) {
  const r = CACHE.requests.find(x=>x.id===id);
  if (!r) return;

  if (r.type === 'leave') {
    const emp = getEmp(r.empId);
    const freeQuota = emp ? (emp.freeLeaveDays||0) : 0;
    const otherLeavesThisMonth = CACHE.leaves.filter(l => l.empId===r.empId && parseInt(l.month)===parseInt(r.month) && parseInt(l.year)===parseInt(r.year));
    const alreadyUsed = otherLeavesThisMonth.reduce((s,l)=>s+(l.dayNumbers||[]).length,0);
    const availableFree = Math.max(0, freeQuota - alreadyUsed);
    const requestedDays = (r.dayNumbers||[]).length;
    const overage = Math.max(0, requestedDays - availableFree);
    if (overage > 0) { openLeaveApprovalModal(r, overage); return; }
    await finalizeApproveLeave(r, 0);
    return;
  }

  r.status = 'approved';
  r.approvedAt = today();
  try {
    const loanId = 'LOAN' + Date.now();
    await Cloud.setDoc('loans', loanId, {
      id: loanId, empId: r.empId, amount: r.amount,
      reason: r.reason, status: 'deducted', createdAt: today(), reqId: id,
      month: r.requestMonth, year: r.requestYear
    });
    await Cloud.setDoc('requests', id, r);
    await refreshCache();
    renderAdminTab(activeTab);
  } catch(e) { alert('Gagal approve: ' + e.message); }
}

function renderCalGrid(month, year, allowedDays, ownerMode, excludeEmpId) {
  const dows = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  let cells = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i=0; i<firstDay; i++) cells += `<div class="cal-day empty-cell"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const isAllowed = allowedDays.includes(d);
    if (ownerMode) {
      const hasNote = getCalendarNotesForDay(d, month, year).length > 0;
      cells += `<div class="cal-day ${isAllowed?'allowed':''} owner-mode" id="calday-${d}" style="position:relative">
        <span onclick="toggleCalDay(${d})" style="display:block;width:100%;height:100%;cursor:pointer">${d}</span>
        <button class="cal-note-btn ${hasNote?'has-note':''}" onclick="event.stopPropagation();openCalendarNoteModal(${d})" title="Catatan absen">${hasNote?'📌':'📝'}</button>
      </div>`;
    } else {
      const takenInfo = isAllowed ? getDayTakenByOther(d, month, year, excludeEmpId) : null;
      const isTaken = !!takenInfo;
      const canClick = isAllowed && !isTaken;
      const clickFn = canClick ? `onclick="pickLeaveDay(${d}, ${isAllowed})"` : '';
      const titleAttr = isTaken ? `title="Sudah diambil ${takenInfo.pending ? '(menunggu approval)' : 'karyawan lain'}"` : '';
      cells += `<div class="cal-day ${isAllowed?'allowed':''} ${isTaken?'taken':''}" id="calday-${d}" ${clickFn} ${titleAttr}>${d}</div>`;
    }
  }
  return `<div class="cal-grid">${cells}</div>`;
}

// ========================
// PAYROLL ENGINE
// ========================
function countDaysInMonth(month, year) { return new Date(year, month+1, 0).getDate(); }

function generateSlip(emp, month, year) {
  const totalDaysInMonth = countDaysInMonth(month, year);

  // approved leaves this month for this employee
  const empLeaves = CACHE.leaves.filter(l => l.empId === emp.id && parseInt(l.month)===month && parseInt(l.year)===year);
  const leaveDates = empLeaves.flatMap(l => l.dates || []);
  const leaveDayNumbers = empLeaves.flatMap(l => l.dayNumbers || []);
  const izinDays = leaveDayNumbers.length;

  // how many days reduce salary is decided by Admin at approval time (deductDays field).
  // Legacy leave records saved before this feature fall back to the old auto-calc.
  const calEntry = getCalendarEntry(month, year);
  const allowedDays = calEntry ? calEntry.allowedDays : [];
  const freeQuota = emp.freeLeaveDays || 0;
  const paidDeductDays = empLeaves.reduce((sum, l) => {
    if (typeof l.deductDays === 'number') return sum + l.deductDays;
    const eligibleFree = (l.dayNumbers||[]).filter(d => allowedDays.includes(d)).length;
    return sum + Math.max(0, (l.dayNumbers||[]).length - Math.min(eligibleFree, freeQuota));
  }, 0);
  const freeDaysUsed = izinDays - paidDeductDays;

  // ad-hoc absence notes recorded by Admin/Supervisor directly on the calendar
  // (e.g. employee didn't show up on a locked/non-leave date)
  const calNotes = CACHE.calendarNotes.filter(n => n.empId === emp.id && parseInt(n.month)===month && parseInt(n.year)===year);
  const calNoteDeductDays = calNotes.reduce((s,n)=>s+(n.deductDays||0), 0);
  const calNoteDates = calNotes.map(n => `${n.day} ${monthName(month)} ${year} (potong ${n.deductDays} hari — ${n.reason||'-'})`);

  const totalDeductDays = paidDeductDays + calNoteDeductDays;

  // actual work days = calendar days in month - all salary-reducing days
  // (non-deducted free-leave days still count as "worked" for pay purposes)
  const hariKerjaAktual = totalDaysInMonth - totalDeductDays;

  const dailyWage = emp.dailyWage || 0;
  const gajiKotor = dailyWage * hariKerjaAktual;

  // bonus this month
  const bonuses = CACHE.bonuses.filter(b => b.empId === emp.id && b.month === month && b.year === year);
  const totalBonus = bonuses.reduce((s,b) => s + b.amount, 0);

  // mandatory installment (owner-set) — balance-based, auto-stops when paid off
  const inst = CACHE.installments.find(i => i.empId === emp.id && i.status === 'active');
  const instCalc = inst ? computeInstallmentForMonth(inst, month, year) : null;
  const instDeduct = instCalc ? instCalc.deduct : 0;

  // active loan from employee requests — deducted IN FULL, only in the month it was taken
  const monthLoans = CACHE.loans.filter(l => l.empId === emp.id && parseInt(l.month)===month && parseInt(l.year)===year);
  const loanDeduct = monthLoans.reduce((s,l) => s + (l.amount||0), 0);

  const take = Math.max(0, gajiKotor + totalBonus - instDeduct - loanDeduct);

  // manual admin review/override for unexpected cases (custom +/- adjustments & notes)
  const override = CACHE.payrollOverrides.find(o => o.empId===emp.id && parseInt(o.month)===month && parseInt(o.year)===year);
  const customAdjustments = override ? (override.customAdjustments||[]) : [];
  const customTotal = customAdjustments.reduce((s,a)=>s+(a.amount||0),0);
  const reviewNotes = override ? (override.notes||'') : '';
  const takeFinal = Math.max(0, take + customTotal);

  return {
    empId: emp.id, name: emp.name, dailyWage, totalDaysInMonth, izinDays, paidDeductDays, freeDaysUsed,
    calNotes, calNoteDeductDays, calNoteDates, hariKerjaAktual, gajiKotor, totalBonus, bonuses, instDeduct, installment: inst, instCalc, loanDeduct,
    take: takeFinal, customAdjustments, customTotal, reviewNotes, leaveDates
  };
}

function pickLeaveDay(d, isAllowed) {
  if (!isAllowed) return;
  const idx = selectedLeaveDays.indexOf(d);
  if (idx >= 0) selectedLeaveDays.splice(idx, 1);
  else selectedLeaveDays.push(d);
  document.getElementById(`calday-${d}`).classList.toggle('selected');
  document.getElementById('lvSelectedDisplay').value = selectedLeaveDays.sort((a,b)=>a-b).join(', ') || '';
}

async function submitLeave() {
  if (selectedLeaveDays.length === 0) { alert('Pilih minimal 1 tanggal!'); return; }
  const reason = document.getElementById('lvReason').value.trim();

  // check quota warning (informational; admin still must approve)
  const calEntry = getCalendarEntry(leaveFormMonth, leaveFormYear);
  const allowedDays = calEntry ? calEntry.allowedDays : [];
  const empLeavesThisMonth = CACHE.leaves.filter(l => l.empId === currentUser.id && l.month === leaveFormMonth && l.year === leaveFormYear);
  const daysAlreadyTaken = empLeavesThisMonth.flatMap(l => l.dayNumbers || []).length;
  const emp = getEmp(currentUser.id);
  const freeQuota = emp ? (emp.freeLeaveDays || 0) : 0;

  if (daysAlreadyTaken >= freeQuota && freeQuota > 0) {
    if (!confirm(`Jatah cuti tanpa potong gaji kamu bulan ini sudah maksimal (${freeQuota} hari). Pengajuan ini akan memotong gaji. Lanjutkan?`)) return;
  }
  if (daysAlreadyTaken + selectedLeaveDays.length > freeQuota) {
    const sisa = Math.max(0, freeQuota - daysAlreadyTaken);
    if (!confirm(`Dari ${selectedLeaveDays.length} hari yang dipilih, hanya ${sisa} hari yang masih gratis. Sisanya akan memotong gaji. Lanjutkan?`)) return;
  }

  const dates = selectedLeaveDays.sort((a,b)=>a-b).map(d => `${d} ${monthName(leaveFormMonth)} ${leaveFormYear}`);
  const btn = document.getElementById('lvSubmitBtn');
  btn.disabled = true; btn.textContent = 'Mengirim...';
  try {
    const reqId = 'REQ'+Date.now();
    await Cloud.setDoc('requests', reqId, {
      id: reqId, empId: currentUser.id, type: 'leave', dates, dayNumbers: selectedLeaveDays.slice(),
      reason, month: leaveFormMonth, year: leaveFormYear, status: 'pending', createdAt: today()
    });
    await refreshCache();
    alert('Pengajuan izin berhasil dikirim! Tunggu approval dari admin.');
    activeTab = 'myrequests';
    renderEmployeeApp();
  } catch(e) {
    alert('Gagal kirim: ' + e.message);
    btn.disabled = false; btn.textContent = 'Kirim Pengajuan Izin';
  }
}

let reviewState = null;

function openPayrollReview(empId, month, year) {
  const emp = getEmp(empId);
  if (!emp) return;
  const existingLeaves = CACHE.leaves.filter(l => l.empId===empId && parseInt(l.month)===month && parseInt(l.year)===year);
  const overrideId = `${empId}_${month}_${year}`;
  const existingOverride = CACHE.payrollOverrides.find(o=>o.id===overrideId);
  const activeInst = CACHE.installments.find(i => i.empId===empId && i.status==='active');
  reviewState = {
    empId, month, year, overrideId,
    leaves: existingLeaves.map(l => ({...l})),
    customAdjustments: existingOverride ? existingOverride.customAdjustments.map(a=>({...a})) : [],
    notes: existingOverride ? (existingOverride.notes||'') : '',
    extraInstallmentPayment: existingOverride ? (existingOverride.extraInstallmentPayment||0) : 0,
    hasActiveInstallment: !!activeInst
  };
  renderPayrollReviewModal();
}

  const emp = getEmp(reviewState.empId);
  showModal('Review Gaji: ' + emp.name + ' — ' + monthName(reviewState.month) + ' ' + reviewState.year, `
    <div class="card-title">Tanggal Izin Tercatat</div>
    ${reviewState.leaves.length===0 ? `<div class="empty" style="padding:14px 0">Tidak ada izin tercatat bulan ini.</div>` :

        <div class="loan-item" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div>
            <div class="loan-meta"><b>${(l.dates||[]).join(', ')}</b></div>

      `).join('')
    }
    <button class="btn btn-ghost btn-sm" style="margin:10px 0 16px" onclick="openAddManualLeave()">+ Tambah Tanggal Izin Manual</button>
    <div class="divider"></div>

    <div class="card-title">Penyesuaian Custom (+/-)</div>
    ${reviewState.customAdjustments.length===0 ? `<div class="empty" style="padding:10px 0">Belum ada penyesuaian.</div>` :
      reviewState.customAdjustments.map((a,idx) => `
        <div class="loan-item" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div class="loan-meta">${a.note} — <b style="color:${a.amount>=0?'var(--green)':'var(--red)'}">${a.amount>=0?'+':''}${fmtRp(a.amount)}</b></div>
          <button class="btn btn-danger btn-sm" onclick="removeReviewAdjustment(${idx})">Hapus</button>
        </div>
      `).join('')
    }
    <div class="field" style="margin-top:10px"><label>Keterangan</label><input id="revAdjNote" placeholder="Contoh: koreksi lembur, dll"></div>
    <div class="field"><label>Nominal (boleh minus untuk potongan)</label><input type="number" id="revAdjAmount" placeholder="-50000 atau 50000"></div>
    <button class="btn btn-ghost btn-sm" style="margin-bottom:16px" onclick="addReviewAdjustment()">+ Tambah Penyesuaian</button>
    <div class="divider"></div>

    ${reviewState.hasActiveInstallment ? `
      <div class="card-title">Pembayaran Cicilan Tambahan Bulan Ini</div>
      <div class="notice" style="margin-bottom:10px">Pembayaran ekstra ini akan ikut memotong gaji bulan ini <b>dan</b> mengurangi sisa pokok cicilan, sehingga jangka waktu cicilan otomatis lebih singkat.</div>
      <div class="field"><label>Nominal Pembayaran Tambahan (Rp)</label><input type="number" id="revExtraInst" value="${reviewState.extraInstallmentPayment||0}" placeholder="0"></div>
      <div class="divider"></div>
    ` : ''}

    <div class="field"><label>Catatan</label><textarea id="revNotes" placeholder="Catatan tambahan untuk slip gaji ini">${reviewState.notes}</textarea></div>
    <div class="notice warn" style="margin-bottom:14px">Perubahan di atas baru berlaku ke perhitungan gaji setelah ditekan <b>Simpan</b>.</div>
    <button class="btn btn-primary" onclick="savePayrollReview()">💾 Simpan Perubahan</button>
  `);
}

function removeReviewLeave(idx) {
  reviewState.leaves.splice(idx, 1);
  renderPayrollReviewModal();
}

function openAddManualLeave() {
  showModal('Tambah Tanggal Izin Manual', `
    <div class="field"><label>Tanggal (angka hari, 1-31)</label><input type="number" id="manLeaveDay" min="1" max="31"></div>
    <div class="field"><label>Potong Gaji</label>
      <select id="manLeaveDeduct"><option value="0">0 hari (gratis)</option><option value="1">1 hari</option></select>
    </div>
    <div class="field"><label>Keterangan</label><input id="manLeaveReason" value="Input manual oleh Admin"></div>
    <button class="btn btn-primary" onclick="confirmAddManualLeave()">Tambah</button>
  `);
}

function confirmAddManualLeave() {
  const day = parseInt(document.getElementById('manLeaveDay').value);
  const deduct = parseInt(document.getElementById('manLeaveDeduct').value);
  const reason = document.getElementById('manLeaveReason').value.trim() || 'Input manual oleh Admin';
  if (!day || day<1 || day>31) { alert('Isi tanggal yang valid!'); return; }
  reviewState.leaves.push({
    id: 'LV'+Date.now(), empId: reviewState.empId, month: reviewState.month, year: reviewState.year,
    dayNumbers: [day], dates: [`${day} ${monthName(reviewState.month)} ${reviewState.year}`],
    deductDays: deduct, reason, approvedAt: today(), reqId: null, _isNew: true
  });
  renderPayrollReviewModal();
}

function addReviewAdjustment() {
  const note = document.getElementById('revAdjNote').value.trim();
  const amount = parseInt(document.getElementById('revAdjAmount').value);
  if (!note || isNaN(amount)) { alert('Isi keterangan dan nominal!'); return; }
  reviewState.customAdjustments.push({ note, amount });
  renderPayrollReviewModal();
}

function removeReviewAdjustment(idx) {
  reviewState.customAdjustments.splice(idx, 1);
  renderPayrollReviewModal();
}

async function savePayrollReview() {
  reviewState.notes = document.getElementById('revNotes').value.trim();
  const extraEl = document.getElementById('revExtraInst');
  const extraInstallmentPayment = extraEl ? (parseInt(extraEl.value) || 0) : 0;
  const { empId, month, year, overrideId } = reviewState;
  try {
    const originalLeaves = CACHE.leaves.filter(l => l.empId===empId && parseInt(l.month)===month && parseInt(l.year)===year);
    const keptIds = new Set(reviewState.leaves.filter(l=>!l._isNew).map(l=>l.id));
    const toDelete = originalLeaves.filter(l => !keptIds.has(l.id));
    for (const l of toDelete) await Cloud.deleteDoc('leaves', l.id);
    for (const l of reviewState.leaves.filter(l=>l._isNew)) {
      const clean = {...l}; delete clean._isNew;
      await Cloud.setDoc('leaves', clean.id, clean);
    }
    await Cloud.setDoc('payrollOverrides', overrideId, {
      id: overrideId, empId, month, year,
      customAdjustments: reviewState.customAdjustments, notes: reviewState.notes,
      extraInstallmentPayment, updatedAt: today()
    });
    await refreshCache();
    closeModal();
    document.getElementById('mainContent').innerHTML = renderPayrollSlips(month, year);
  } catch(e) { alert('Gagal menyimpan: ' + e.message); }
}

// ========================
// LAPORAN (ADMIN: detail per orang, overview semua karyawan, grafik tahunan)
// ========================
let reportState = {
  type: 'detail', period: 'thisMonth',
  month: new Date().getMonth(), year: new Date().getFullYear(),
  customFromMonth: new Date().getMonth(), customFromYear: new Date().getFullYear(),
  customToMonth: new Date().getMonth(), customToYear: new Date().getFullYear(),
  empId: ''
};

function yearOptions(selected) {
  const cur = new Date().getFullYear();
  let opts = '';
  for (let y = cur-3; y <= cur+1; y++) opts += `<option value="${y}" ${selected===y?'selected':''}>${y}</option>`;
  return opts;
}
function monthOptionsHtml(selected, onchangeFn) {
  return `<select onchange="${onchangeFn}(parseInt(this.value))">${[...Array(12)].map((_,i)=>`<option value="${i}" ${selected===i?'selected':''}>${monthName(i)}</option>`).join('')}</select>`;
}

function setReportType(t) { reportState.type = t; document.getElementById('reportOutput').innerHTML=''; renderAdminTab('reports'); }
function setReportPeriod(p) { reportState.period = p; renderAdminTab('reports'); }
function setRpMonth(v){ reportState.month = v; }
function setRpYear(v){ reportState.year = v; }
function setRpFromMonth(v){ reportState.customFromMonth = v; }
function setRpFromYear(v){ reportState.customFromYear = v; }
function setRpToMonth(v){ reportState.customToMonth = v; }
function setRpToYear(v){ reportState.customToYear = v; }
function setRpEmp(v){ reportState.empId = v; }

function adminReports() {
  return `
    <div class="section-title" style="margin-bottom:6px">Laporan & Export</div>
    <div class="card no-print">
      <div class="card-title">Jenis Laporan</div>
      <div class="report-type-grid">
        <button class="report-type-btn ${reportState.type==='detail'?'active':''}" onclick="setReportType('detail')">📄 Detail Gaji per Orang per Periode</button>
        <button class="report-type-btn ${reportState.type==='overview'?'active':''}" onclick="setReportType('overview')">🧾 Keseluruhan Gaji Karyawan (Owner)</button>
        <button class="report-type-btn ${reportState.type==='yearly'?'active':''}" onclick="setReportType('yearly')">📈 Overview per Tahun (Grafik)</button>
      </div>

      ${reportState.type !== 'yearly' ? `
        <div class="card-title" style="margin-top:14px">Periode</div>
        <div class="period-presets">
          <button class="${reportState.period==='thisMonth'?'active':''}" onclick="setReportPeriod('thisMonth')">Bulan Ini</button>
          <button class="${reportState.period==='pickMonth'?'active':''}" onclick="setReportPeriod('pickMonth')">Pilih Bulan</button>
          <button class="${reportState.period==='custom'?'active':''}" onclick="setReportPeriod('custom')">Custom</button>
        </div>
        ${reportState.period==='pickMonth' ? `
          <div class="field-row">
            ${monthOptionsHtml(reportState.month,'setRpMonth')}
            <select onchange="setRpYear(parseInt(this.value))">${yearOptions(reportState.year)}</select>
          </div>` : ''}
        ${reportState.period==='custom' ? `
          <div class="form-hint">Dari:</div>
          <div class="field-row">
            ${monthOptionsHtml(reportState.customFromMonth,'setRpFromMonth')}
            <select onchange="setRpFromYear(parseInt(this.value))">${yearOptions(reportState.customFromYear)}</select>
          </div>
          <div class="form-hint">Sampai:</div>
          <div class="field-row">
            ${monthOptionsHtml(reportState.customToMonth,'setRpToMonth')}
            <select onchange="setRpToYear(parseInt(this.value))">${yearOptions(reportState.customToYear)}</select>
          </div>` : ''}
      ` : `
        <div class="card-title" style="margin-top:14px">Tahun</div>
        <select onchange="setRpYear(parseInt(this.value))">${yearOptions(reportState.year)}</select>
      `}

      ${(reportState.type==='detail' || reportState.type==='yearly') ? `
        <div class="card-title" style="margin-top:14px">Karyawan</div>
        <select onchange="setRpEmp(this.value)">
          <option value="">-- Pilih Karyawan --</option>
          ${CACHE.employees.map(e=>`<option value="${e.id}" ${reportState.empId===e.id?'selected':''}>${e.name}</option>`).join('')}
        </select>
      ` : ''}

      <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="generateReport()">🔍 Tampilkan</button>
        <button class="btn btn-ghost" onclick="window.print()">🖨️ Print</button>
        <button class="btn btn-ghost" onclick="exportReportExcel()">📊 Export Excel</button>
      </div>
    </div>
    <div id="reportOutput"></div>
  `;
}

function getReportMonthList() {
  if (reportState.type === 'yearly') return [...Array(12)].map((_,i)=>({month:i, year:reportState.year}));
  if (reportState.period === 'thisMonth') {
    const now = new Date();
    return [{month: now.getMonth(), year: now.getFullYear()}];
  }
  if (reportState.period === 'pickMonth') return [{month: reportState.month, year: reportState.year}];
  const list = [];
  let m = reportState.customFromMonth, y = reportState.customFromYear;
  const endKey = reportState.customToYear*12 + reportState.customToMonth;
  let guard = 0;
  while (y*12+m <= endKey && guard < 120) {
    list.push({month:m, year:y});
    m++; if (m>11){m=0;y++;}
    guard++;
  }
  return list;
}

function periodLabel(months) {
  if (months.length === 1) return `${monthName(months[0].month)} ${months[0].year}`;
  return `${monthName(months[0].month)} ${months[0].year} — ${monthName(months[months.length-1].month)} ${months[months.length-1].year}`;
}

function reportHeaderHtml(subtitle) {
  return `
    <div class="report-print-header">
      <img src="${LOGO_DATA_URI}" class="ps-logo" alt="Sumber Rasa">
      <div class="ps-brand">SUMBER RASA</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${subtitle}</div>
    </div>`;
}

function generateReport() {
  const out = document.getElementById('reportOutput');
  if (reportState.type === 'detail') {
    if (!reportState.empId) { out.innerHTML = `<div class="card"><div class="empty">Pilih karyawan dulu.</div></div>`; return; }
    out.innerHTML = renderDetailReport();
  } else if (reportState.type === 'overview') {
    out.innerHTML = renderOverviewReport();
  } else if (reportState.type === 'yearly') {
    if (!reportState.empId) { out.innerHTML = `<div class="card"><div class="empty">Pilih karyawan dulu.</div></div>`; return; }
    out.innerHTML = renderYearlyChartReport();
    setTimeout(drawYearlyChart, 0);
  }
}

function renderDetailReport() {
  const emp = getEmp(reportState.empId);
  const months = getReportMonthList();
  const slips = months.map(({month,year}) => generateSlip(emp, month, year));
  const totalTake = slips.reduce((s,x)=>s+x.take,0);
  return `
    ${reportHeaderHtml('Laporan Detail Gaji — ' + emp.name)}
    <div class="card">
      <table class="mini-table">
        <thead><tr><th>Periode</th><th>Hari Kerja</th><th>Gaji Kotor</th><th>Bonus</th><th>Cicilan/Pinjaman</th><th>Penyesuaian</th><th>Take Home</th></tr></thead>
        <tbody>
          ${slips.map((s,i) => `<tr>
            <td>${monthName(months[i].month)} ${months[i].year}</td>
            <td>${s.hariKerjaAktual}/${s.totalDaysInMonth}</td>
            <td>${fmtRp(s.gajiKotor)}</td>
            <td>${fmtRp(s.totalBonus)}</td>
            <td>${fmtRp(s.instDeduct+s.loanDeduct)}</td>
            <td>${s.customTotal>=0?'+':''}${fmtRp(s.customTotal)}</td>
            <td><b>${fmtRp(s.take)}</b></td>
          </tr>`).join('')}
        </tbody>
        <tfoot><tr><td colspan="6">Total Take Home Periode Ini</td><td><b>${fmtRp(totalTake)}</b></td></tr></tfoot>
      </table>
    </div>`;
}

function renderOverviewReport() {
  const months = getReportMonthList();
  if (CACHE.employees.length === 0) return `<div class="card"><div class="empty">Belum ada karyawan.</div></div>`;
  const matrix = CACHE.employees.map(emp => {
    const takes = months.map(({month,year}) => generateSlip(emp, month, year).take);
    return { emp, takes, total: takes.reduce((s,t)=>s+t,0) };
  });
  const colTotals = months.map((_,i) => matrix.reduce((s,r)=>s+r.takes[i],0));
  const grandTotal = matrix.reduce((s,r)=>s+r.total,0);
  const multiMonth = months.length > 1;
  return `
    ${reportHeaderHtml('Laporan Gaji Bersih per Bulan — Semua Karyawan')}
    <div class="report-meta" style="text-align:center;margin-bottom:10px;color:var(--muted);font-size:13px">Periode: ${periodLabel(months)}</div>
    <div class="card" style="overflow-x:auto">
      <table class="mini-table">
        <thead><tr>
          <th>Nama</th>
          ${months.map(({month,year})=>`<th>Gaji Bersih ${monthName(month).slice(0,3)} ${year}</th>`).join('')}
          ${multiMonth ? '<th>Total</th>' : ''}
        </tr></thead>
        <tbody>
          ${matrix.map(r => `<tr>
            <td>${r.emp.name}</td>
            ${r.takes.map(t=>`<td>${fmtRp(t)}</td>`).join('')}
            ${multiMonth ? `<td><b>${fmtRp(r.total)}</b></td>` : ''}
          </tr>`).join('')}
        </tbody>
        <tfoot><tr>
          <td>Total</td>
          ${colTotals.map(t=>`<td><b>${fmtRp(t)}</b></td>`).join('')}
          ${multiMonth ? `<td><b>${fmtRp(grandTotal)}</b></td>` : ''}
        </tr></tfoot>
      </table>
    </div>`;
}

function renderYearlyChartReport() {
  const emp = getEmp(reportState.empId);
  const year = reportState.year;
  const monthlyTakes = [...Array(12)].map((_,m) => generateSlip(emp, m, year).take);
  return `
    ${reportHeaderHtml(`Overview Gaji ${emp.name} — Tahun ${year}`)}
    <div class="card" style="padding:14px"><canvas id="yearlyChartCanvas" height="220"></canvas></div>
    <div class="card">
      <table class="mini-table">
        <thead><tr><th>Bulan</th>${[...Array(12)].map((_,m)=>`<th>${monthName(m).slice(0,3)}</th>`).join('')}</tr></thead>
        <tbody><tr><td>Take Home</td>${monthlyTakes.map(t=>`<td>${fmtRp(t)}</td>`).join('')}</tr></tbody>
      </table>
    </div>`;
}

let yearlyChartInstance = null;
function drawYearlyChart() {
  const emp = getEmp(reportState.empId);
  if (!emp || typeof Chart === 'undefined') return;
  const year = reportState.year;
  const monthlyTakes = [...Array(12)].map((_,m) => generateSlip(emp, m, year).take);
  const ctx = document.getElementById('yearlyChartCanvas');
  if (!ctx) return;
  if (yearlyChartInstance) yearlyChartInstance.destroy();
  yearlyChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [...Array(12)].map((_,m)=>monthName(m).slice(0,3)),
      datasets: [{ label: 'Take Home', data: monthlyTakes, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.15)', fill: true, tension: 0.3 }]
    },
    options: { plugins: { legend: { display:false } }, scales: { y: { ticks: { callback: v => 'Rp'+Math.round(v/1000)+'rb' } } } }
  });
}

function exportReportExcel() {
  if (typeof XLSX === 'undefined') { alert('Modul Excel belum termuat, cek koneksi internet lalu coba lagi.'); return; }
  let rows = [], filename = 'laporan.xlsx';
  if (reportState.type === 'detail') {
    const emp = getEmp(reportState.empId);
    if (!emp) { alert('Pilih karyawan dulu!'); return; }
    const months = getReportMonthList();
    rows.push(['Periode','Hari Kerja','Gaji Kotor','Bonus','Cicilan/Pinjaman','Penyesuaian','Take Home']);
    months.forEach(({month,year}) => {
      const s = generateSlip(emp, month, year);
      rows.push([`${monthName(month)} ${year}`, `${s.hariKerjaAktual}/${s.totalDaysInMonth}`, s.gajiKotor, s.totalBonus, s.instDeduct+s.loanDeduct, s.customTotal, s.take]);
    });
    filename = `detail-gaji-${emp.name}.xlsx`;
  } else if (reportState.type === 'overview') {
    const months = getReportMonthList();
    rows.push(['Nama', ...months.map(({month,year})=>`Gaji Bersih ${monthName(month)} ${year}`), 'Total']);
    CACHE.employees.forEach(emp => {
      const takes = months.map(({month,year}) => generateSlip(emp, month, year).take);
      rows.push([emp.name, ...takes, takes.reduce((s,t)=>s+t,0)]);
    });
    filename = `gaji-bersih-per-bulan.xlsx`;
  } else if (reportState.type === 'yearly') {
    const emp = getEmp(reportState.empId);
    if (!emp) { alert('Pilih karyawan dulu!'); return; }
    rows.push(['Bulan','Take Home']);
    for (let m=0;m<12;m++) rows.push([monthName(m), generateSlip(emp, m, reportState.year).take]);
    filename = `overview-tahunan-${emp.name}-${reportState.year}.xlsx`;
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Laporan');
  XLSX.writeFile(wb, filename);
}

// ========================
// MODAL HELPERS
// ========================
function showModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

// ========================
// UTILS
// ========================
function fmtRp(n) { return 'Rp ' + (n||0).toLocaleString('id-ID'); }
function today() { return new Date().toLocaleDateString('id-ID', {day:'2-digit',month:'short',year:'numeric'}); }
function bulanLabel() { return new Date().toLocaleDateString('id-ID',{month:'long',year:'numeric'}); }
function monthName(m) { return ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][m]; }
function labelStatus(s) { return {pending:'Menunggu',approved:'Disetujui',rejected:'Ditolak',cancelled:'Dibatalkan'}[s] || s; }
async function ackCancelNotice(reqId) {
  const r = CACHE.requests.find(x=>x.id===reqId);
  if (!r) return;
  r.cancelNotice = false;
  try { await Cloud.setDoc('requests', reqId, r); await refreshCache(); renderEmpTab('home'); }
  catch(e) { alert('Gagal: ' + e.message); }
}

function getEmp(id) { return CACHE.employees.find(e=>e.id===id); }
